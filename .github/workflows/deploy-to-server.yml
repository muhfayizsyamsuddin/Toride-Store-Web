name: Deploy to Server

on:
    push:
        branches:
            - main

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Log in to Docker Hub
              uses: docker/login-action@v2
              with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}
            
            - name: Build Docker image
              run: |
                docker build -t ${{ secrets.DOCKER_USERNAME }}/toride-store-app:v1.0 .

            - name: Push Docker image
              run: |
                docker push ${{ secrets.DOCKER_USERNAME }}/toride-store-app:v1.0

    deploy:
        name: Deploy via SSH
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Deploy to server
              uses: appleboy/ssh-action@v1
              with:
                host: ${{ secrets.SSH_SERVER }}
                username: ${{ secrets.SSH_USER }}
                key: ${{ secrets.SSH_PRIVATE_KEY }}
                script: |
                  # cd ~/project/toridestore
                  # docker compose pull
                  # docker compose up -d --no-deps
                  mkdir -p ~/project/toridestore
                  cd ~/project/toridestore
                  echo ${{ vars.APP_COMPOSE }} | base64 -d > docker-compose.yml
                  docker compose pull
                  docker compose up -d